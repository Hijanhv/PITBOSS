name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (Rust / Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Unit tests (all contracts)
        run: cargo test --workspace --locked

      - name: Build market wasm (for the deploy test)
        run: cargo build --locked --release --target wasm32v1-none -p market

      - name: Factory → Market cross-contract deploy test
        run: cargo test --locked -p factory --features wasm-tests

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pitboss/web lint

      - name: Test
        run: pnpm --filter @pitboss/web test

      - name: Build
        run: pnpm --filter @pitboss/web build
